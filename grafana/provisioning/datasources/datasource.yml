apiVersion: 1

datasources:
  - name: n8n-MySQL
    type: mysql
    access: proxy
    url: mysql:3306
    database: n8n_db
    user: root
    secureJsonData:
      password: rootpassword
    jsonData:
      maxOpenConns: 100
      maxIdleConns: 100
      connMaxLifetime: 14400
    isDefault: true
    editable: true
